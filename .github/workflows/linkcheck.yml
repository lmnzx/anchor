name: linkcheck

on:
  push:
    branches:
      - unstable
  pull_request:
    paths:
      - 'docs/**'
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linkcheck:
    name: Check broken links
    if: github.repository_owner == 'sigp'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Install Playwright browsers
        run: npx playwright install
        working-directory: docs

      - name: Build vocs
        run: npm run build
        working-directory: docs

      - name: Start vocs preview server
        run: |
          npm run preview &
          sleep 10
        working-directory: docs

      - name: Run linkcheck
        run: |
          curl -sL https://github.com/filiph/linkcheck/releases/download/3.0.0/linkcheck-3.0.0-linux-x64.tar.gz | tar xvzf - linkcheck/linkcheck --strip 1
          ./linkcheck localhost:4173 -d
