[workspace]
# Extra tooling projects will be added.
members = [
    "anchor",
    "anchor/client",
    "anchor/common/api_types",
    "anchor/common/bls_lagrange",
    "anchor/common/qbft",
    "anchor/common/ssv_network_config",
    "anchor/common/ssv_types",
    "anchor/common/version",
    "anchor/database",
    "anchor/eth",
    "anchor/http_api",
    "anchor/http_metrics",
    "anchor/keygen",
    "anchor/keysplit",
    "anchor/message_receiver",
    "anchor/message_sender",
    "anchor/message_validator",
    "anchor/network",
    "anchor/processor",
    "anchor/qbft_manager",
    "anchor/signature_collector",
    "anchor/subnet_tracker",
    "anchor/validator_store",
]
resolver = "2"

[workspace.package]
edition = "2021"

# This table has three subsections: first the internal dependencies, then the lighthouse dependencies, then all other.
[workspace.dependencies]
anchor_validator_store = { path = "anchor/validator_store" }
api_types = { path = "anchor/common/api_types" }
bls_lagrange = { path = "anchor/common/bls_lagrange" }
client = { path = "anchor/client" }
database = { path = "anchor/database" }
eth = { path = "anchor/eth" }
http_api = { path = "anchor/http_api" }
http_metrics = { path = "anchor/http_metrics" }
keygen = { path = "anchor/keygen" }
keysplit = { path = "anchor/keysplit" }
message_receiver = { path = "anchor/message_receiver" }
message_sender = { path = "anchor/message_sender" }
message_validator = { path = "anchor/message_validator" }
network = { path = "anchor/network" }
processor = { path = "anchor/processor" }
qbft = { path = "anchor/common/qbft" }
qbft_manager = { path = "anchor/qbft_manager" }
signature_collector = { path = "anchor/signature_collector" }
ssv_network_config = { path = "anchor/common/ssv_network_config" }
ssv_types = { path = "anchor/common/ssv_types" }
subnet_tracker = { path = "anchor/subnet_tracker" }
version = { path = "anchor/common/version" }

beacon_node_fallback = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
bls = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
eth2 = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
eth2_config = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
eth2_network_config = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
health_metrics = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
lighthouse_network = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
metrics = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
safe_arith = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
sensitive_url = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
slashing_protection = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
slot_clock = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
task_executor = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2", default-features = false, features = [
    "tracing",
] }
types = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
unused_port = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
validator_metrics = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
validator_services = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }
validator_store = { git = "https://github.com/sigp/lighthouse", rev = "b71b5f2" }

alloy = { version = "0.11.0", features = [
    "sol-types",
    "transports",
    "json",
    "contract",
    "pubsub",
    "provider-ws",
    "rpc-types",
    "rlp",
] }
async-channel = "1.9"
axum = "0.8.1"
base64 = "0.22.1"
blst = "0.3.14"
# the custom repo is needed because they fix to a specific version of blst, which conflicts with the line above
blstrs_plus = { git = "https://github.com/dknopik/blstrs", branch = "pls" }
clap = { version = "4.5.15", features = ["derive", "wrap_help"] }
dashmap = "6.1.0"
derive_more = { version = "1.0.0", features = ["full"] }
dirs = "6.0.0"
discv5 = "0.9.0"
either = "1.13.0"
enr = "0.13.0"
ethereum_ssz = "0.7"
ethereum_ssz_derive = "0.7.0"
futures = "0.3.30"
hex = "0.4.3"
hyper = "1.4"
indexmap = "2.7.0"
multiaddr = "0.18.2"
num_cpus = "1"
openssl = "0.10.68"
parking_lot = "0.12"
r2d2 = "0.8.10"
r2d2_sqlite = "0.21.0"
rand = "0.8.5"
reqwest = "0.12.12"
rusqlite = "0.28.0"
serde = { version = "1.0.208", features = ["derive"] }
serde_json = "1.0.140"
serde_yaml = "0.9"
sha2 = "0.10.8"
strum = { version = "0.26.3", features = ["derive"] }
thiserror = "2.0.11"
tokio = { version = "1.39.2", features = [
    "rt",
    "rt-multi-thread",
    "time",
    "signal",
    "macros",
] }
tower-http = { version = "0.6", features = ["cors"] }
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["fmt", "env-filter"] }
tree_hash = "0.8"
tree_hash_derive = "0.8"
vsss-rs = "5.1.0"
zeroize = "1.8.1"

[patch.crates-io]
# todo: remove when libp2p versions are aligned again. this is only needed because cargo audit crashes otherwise
libp2p = { git = "https://github.com/libp2p/rust-libp2p.git", rev = "082eb16" }
libp2p-mplex = { git = "https://github.com/libp2p/rust-libp2p.git", rev = "082eb16" }
quick-protobuf-codec = { git = "https://github.com/libp2p/rust-libp2p.git", rev = "082eb16" }

[profile.maxperf]
inherits = "release"

codegen-units = 1
incremental = false
lto = "fat"
